services:
  gitlab-duo-bridge:
    image: ghcr.io/jsmarble/gitlab-duo-bridge:latest
    # Pin a specific version in production, e.g.:
    #   image: ghcr.io/jsmarble/gitlab-duo-bridge:1.0.0
    # Or build locally instead of pulling:
    #   build: .
    restart: unless-stopped
    ports:
      # Expose admin dashboard on localhost only — do NOT expose publicly
      - "127.0.0.1:3000:3000"
    environment:
      # REQUIRED: Set a strong random key. Clients must present this as Bearer token.
      PROXY_API_KEY: "${PROXY_API_KEY:?PROXY_API_KEY is required}"
      PORT: "3000"
      DATA_DIR: "/data"
      LOG_LEVEL: "info"
    volumes:
      - duo_bridge_data:/data
    networks:
      - internal
    # No healthcheck override needed — the image ships its own bun-based
    # HEALTHCHECK (hitting /health). Compose honors it for service_healthy.

  # Placeholder for the "Manifest" service that consumes this bridge.
  # Point Manifest's custom provider at:
  #   - Anthropic-compatible: http://gitlab-duo-bridge:3000/v1/messages
  #   - OpenAI-compatible:    http://gitlab-duo-bridge:3000/v1/chat/completions
  # with Authorization: Bearer <PROXY_API_KEY>
  manifest:
    image: your-manifest-image:latest
    restart: unless-stopped
    environment:
      # Example: point Manifest at the bridge
      ANTHROPIC_BASE_URL: "http://gitlab-duo-bridge:3000"
      ANTHROPIC_API_KEY: "${PROXY_API_KEY}"
      # Or for OpenAI-compatible mode:
      OPENAI_BASE_URL: "http://gitlab-duo-bridge:3000/v1"
      OPENAI_API_KEY: "${PROXY_API_KEY}"
    networks:
      - internal
    depends_on:
      gitlab-duo-bridge:
        condition: service_healthy

volumes:
  duo_bridge_data:
    driver: local

networks:
  internal:
    driver: bridge
